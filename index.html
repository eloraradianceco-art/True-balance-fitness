// ── DETAILED CUES ─────────────────────────────────────────────────────
const CUES={
  "Glute Bridge":"Lie on your back, knees bent, feet flat on the floor hip-width apart. Before you lift ANYTHING — squeeze your butt cheeks together first, like you're trying to crack a walnut between them. THEN push your hips up toward the ceiling. Hold 2 seconds at the top. Feel this in your butt, not your lower back. If your back aches, your glutes aren't firing first. Lower back down slowly. Think: SQUEEZE then LIFT.",
  "Clamshell":"Lie on your side with your hips stacked on top of each other like a book standing on its spine. Bend your knees to about 45 degrees. Keep your feet touching together the whole time. Now open your top knee toward the ceiling like a clamshell — your HIPS stay perfectly still the entire time. Don't rock backward. Small clean range beats big sloppy range. Feel the burn on the outside of your hip.",
  "Dead Bug":"Lie on your back. Press your lower back FLAT into the floor — like squishing a bug under your spine. Arms straight up, knees up with shins parallel to the floor. Slowly lower your right arm back and left leg toward the floor at the SAME TIME. Only go as far as your back stays flat. That's the whole game. Bring them back and switch sides. Breathe out as you lower.",
  "Chin Tucks":"Sit or stand tall. Slide your head straight BACK — not down, not up — like you're making a double chin. Feel a gentle stretch at the base of your skull. Hold 2 seconds. Release. This looks silly but it's one of the most powerful exercises for neck pain and forward head posture. Think of a turtle pulling its head back into its shell — straight back.",
  "Wall Angels":"Stand with your back against a wall. Your head, both shoulder blades, AND lower back all touch the wall. Arms up like a goalpost — elbows bent, backs of your hands on the wall. Slowly slide your arms up like making a snow angel, keeping everything in contact with the wall. If your back arches away, gently pull your belly button in. This is hard because your chest is tight — that's exactly why you're doing it.",
  "Prone Y Raise":"Lie face down on the floor or bench. Arms out in a Y shape — about 45 degrees from your body. Thumbs pointing up. Now squeeze your shoulder blades DOWN your back first — like putting them in your back pockets. THEN lift your arms up off the surface. Feel this under your shoulder blades, not in your neck. If your neck is doing all the work, lower your arms and focus on the shoulder blade squeeze first.",
  "Face Pull — Cable or Band":"Set the cable or band at face height. Hold both handles. Pull toward your EARS — not your nose — while spreading your elbows wide and high. At the end of the pull, your elbows should be higher than your wrists. Hold 1 second and feel the squeeze between your shoulder blades. This is posture medicine. Don't rush it. Pull to ears, elbows high.",
  "Sidelying External Rotation — Bilateral":"Lie on your side. Pin your top elbow against your ribs — it does NOT leave your side during this exercise. Bend that elbow to 90 degrees so your forearm points forward. Now rotate your forearm UP toward the ceiling like opening a gate. Keep that elbow glued to your ribs the whole time. Feel this in the back of your shoulder. Go slow — the rotation is the exercise, not how high you get.",
  "Serratus Anterior — Wall Push-Up Plus":"Stand facing a wall, hands on wall at shoulder height. Do a small push-up toward the wall — but at the very END, push a little extra and let your shoulder blades spread apart and wrap around your rib cage. That extra push at the end is called the plus. Hold it for 1 second. Lower back. Feel your shoulder blades move apart on the plus.",
  "TVA Draw-In — Supine":"Lie on your back, knees bent. Place one hand on your belly button. Without holding your breath or dramatically sucking your stomach in, gently draw your belly button toward your spine about 20% — like someone is about to lightly poke your stomach and you brace just enough. Breathe NORMALLY while holding. This is not a crunch. It's a deep quiet squeeze. Think: corset, not armor.",
  "Hamstring Bridge — Heel Drive":"Lie on your back. Slide your feet further from your glutes than a normal bridge — legs more extended. Turn your toes slightly inward. Now drive your heels into the floor like you're trying to drag them toward your body (they won't move). This tension fires your hamstrings. THEN lift your hips. Feel the BACK of your thighs working. Lower slowly. If you get a cramp, that means the hamstrings are working.",
  "Sit-to-Stand":"Sit on the edge of a chair or barstool. Feet flat, hip-width apart. Lean your chest forward over your knees first — most people skip this and that's why it's hard. Now squeeze your glutes and push through your heels to stand. No rocking. No momentum. Start with both hands lightly on a surface for support. Build toward one hand, then no hands. Every time you stand from a chair is a rep.",
  "Kneeling Hip Flexor Stretch":"Kneel on one knee like you're about to propose. Now gently tuck your pelvis under — like you have a tail and you're tucking it between your legs. Feel the stretch at the very front top of your hip, where your thigh meets your pelvis. Don't lean forward — stand tall and tuck under. Hold and breathe deeply into the stretch. The tighter side is the one pulling your pelvis forward.",
  "Doorway Pec Stretch":"Stand in a doorway. Arm at 90 degrees — elbow bent, like taking an oath. Place your forearm flat against the door frame. Step your same-side foot forward through the door and let your chest rotate away. Feel the stretch across your chest and shoulder. Hold at least 45 seconds — less than that and the muscle doesn't actually change.",
  "Thoracic Extension — Foam Roller":"Place the roller horizontally across your mid-back, between your shoulder blades. Support your head with your hands behind your neck — don't let it drop back unsupported. Gently arch over the roller and breathe in, letting gravity open your mid back. Work slowly up and down. ONLY between shoulder blades and base of neck. Do NOT roll your lower back on this.",
  "Lateral Raise — Both Arms":"Stand tall with very light weights at your sides. Your elbows have a slight bend — not fully straight. Lead with your ELBOWS, not your hands — like pushing your wings out to your sides. Lift to shoulder height only. At the top, your pinky should be slightly higher than your thumb — like pouring a tiny bit of water out of each glass. Lower SLOWLY — take 3 full seconds going down. If your upper neck and traps are burning, the weight is too heavy.",
  "Seated Scapular Retraction — Lower Trap":"Sit upright and lean slightly forward — about 10 degrees. Now pull your shoulder blades DOWN and BACK at the same time — like sliding them into your back pockets. Not just back — DOWN and back. Hold for 2 seconds. Release fully. This wakes up the lower trapezius, which is almost always asleep in people with rounded shoulders. Think: slide them down your back, don't just squeeze them together.",
  "Pallof Press — Band":"Anchor your band to a door or post at belly button height. Stand sideways to it and hold the band with both hands at your chest. Feet shoulder-width apart, knees slightly bent. Push both hands straight out in front and HOLD for 2 seconds. The band is constantly trying to twist you toward the anchor — YOUR JOB is to resist that rotation completely. Your whole core fires to stay still. Bring it back, repeat. This is anti-rotation. Don't let the band win.",
  "Lat Pulldown":"Sit at the machine, grip the bar slightly wider than your shoulders with palms facing away. Before pulling — push your chest up slightly and let your shoulder blades DROP DOWN away from your ears. Pull the bar toward your upper chest, leading with your ELBOWS — imagine putting them into your back pockets. Control the weight back up slowly — 3 full seconds up. Feel this along the sides of your back, not in your biceps.",
  "Seated Cable Row — Neutral Grip":"Sit tall, grab the neutral grip handles. Extend your arms forward fully for a complete stretch — feel your shoulder blades spread apart. Now pull your elbows straight back, like you're trying to hold a pencil between your shoulder blades. At the end, they squeeze together and DOWN. Your torso stays upright — don't rock backward to cheat the weight. Return slowly with full control. Reach fully, pull fully, squeeze at the end.",
  "Bird Dog":"Get on all fours — hands under shoulders, knees under hips. Find a neutral spine — not arched up, not rounded down. Extend your right arm forward and your left leg back at the SAME time. Reach LONG — long arm, long leg. Your hips must stay square to the floor the entire time — do not tilt or rotate them. Hold 2 seconds. Slowly bring them back in. Quality of stillness beats how high you go every single time.",
  "Forearm Plank":"Forearms on the floor, elbows directly under your shoulders. Body in a straight line from heels to the top of your head. Squeeze your quads — front of thighs. Squeeze your glutes. Draw your belly button gently in. One rigid plank of wood. No sagging in the hips, no tenting up in the butt. Breathe normally throughout. If your lower back hurts — drop to your knees. Perfect form on your knees beats poor form on your toes.",
  "Standing Glute Squeeze":"Stand tall, feet hip-width apart. Squeeze BOTH glutes at the same time as hard as you can — like you're trying to hold a quarter between your cheeks. Hold for 10 full seconds. You should feel both sides activate. If one side is harder to find or feels weaker, focus your attention specifically there. Do this every single time you stand up from a chair throughout your day. It adds up.",
  "Zone 2 — Incline Walk / Bike":"Zone 2 cardio means working hard enough that talking feels slightly uncomfortable but totally possible. If you can chat effortlessly — go harder. If you can't finish a sentence — slow down. Target: 120 to 140 heartbeats per minute. On a treadmill: set the incline to 8 to 12 percent and walk at a pace that keeps you in that heart rate zone. Steady and consistent the entire time. This pace burns fat directly and builds your aerobic base.",
  "Glute Bridge":"Lie on your back, knees bent, feet flat on the floor hip-width apart. Before you lift ANYTHING — squeeze your butt cheeks together first, like you're trying to crack a walnut between them. THEN push your hips up toward the ceiling. Hold 2 seconds at the top. Feel this in your butt, not your lower back. If your back aches, your glutes aren't firing first. Lower back down slowly. Think: SQUEEZE then LIFT.",
  "Dumbbell Bench Press":"Lie on a bench with feet flat on the floor. Hold the dumbbells at chest level with palms facing your feet. Lower them slowly until your upper arms are just below parallel to the floor — elbows at about 45 degrees from your body (not flared straight out to the sides). Feel the stretch across your chest. Now push the weights up and slightly toward each other at the top. Breathe out as you push. Shoulder blades stay pinched together on the bench throughout.",
  "Push-Up":"Start in a high plank — hands slightly wider than your shoulders, body in a perfectly straight line from heels to head. Lower your chest toward the floor slowly — 2 to 3 seconds down. Elbows track at about 45 degrees from your body — not straight out like a T, not pinned to your sides. At the bottom, your chest should nearly touch the floor. Push the floor AWAY from you back to the start. If too hard on your toes, drop to knees — but keep your body straight from knees to head.",
};

// ── AUTO-SUGGESTION ENGINE ────────────────────────────────────────────
function generateSuggestions(assessment){
  const findings=[],releases=new Set(),stretches=new Set(),activations=new Set(),integrations=new Set();
  const p=assessment.postural||{};
  const findingMap=[
    [p.head_position==="forward","head_forward"],
    [p.shoulder_position==="rounded","shoulders_rounded"],
    [p.thoracic_curve==="kyphotic","thoracic_kyphosis"],
    [p.left_shoulder==="elevated","left_shoulder_elevated"],
    [p.right_shoulder==="elevated","right_shoulder_elevated"],
    [p.pelvic_tilt==="anterior_bilateral","apt_bilateral"],
    [p.pelvic_tilt==="anterior_left","apt_left_dominant"],
    [p.pelvic_tilt==="anterior_right","apt_right_dominant"],
    [p.left_hip==="elevated","left_pelvic_elevation"],
    [p.right_hip==="elevated","right_pelvic_elevation"],
    [p.knee_alignment==="valgus_bilateral","knee_valgus_bilateral"],
    [p.knee_alignment==="valgus_left","knee_valgus_left"],
    [p.knee_alignment==="valgus_right","knee_valgus_right"],
    [p.foot_position==="pronated_bilateral","pronation_bilateral"],
    [p.foot_position==="pronated_left","pronation_left"],
    [p.foot_position==="pronated_right","pronation_right"],
    [p.ankle_dorsiflexion==="limited","ankle_dorsiflexion_limited"],
  ];
  findingMap.forEach(([cond,key])=>{if(cond&&CORRECTIVE_MAP[key]){findings.push(CORRECTIVE_MAP[key]);const cm=CORRECTIVE_MAP[key];cm.release.forEach(e=>releases.add(e));cm.stretch.forEach(e=>stretches.add(e));cm.activate.forEach(e=>activations.add(e));cm.integrate.forEach(e=>integrations.add(e));}});
  const ohsaO=(assessment.ohsa?.overactive||[]),ohsaU=(assessment.ohsa?.underactive||[]);
  const oMap={gastroc_soleus:["Outside Calf Release","Calf Stretch — Bent Knee"],hip_flexors:["Full Quad Release","Kneeling Hip Flexor Stretch"],adductors:["Adductor Release","Adductor Stretch — Side-Lying"],tfl:["TFL Release","Thomas Stretch"],piriformis:["Piriformis Release","Pigeon Stretch"],bicep_femoris:["Bicep Femoris Release","90/90 Hamstring Stretch"],ql:["QL Release","QL Stretch"],pec_minor:["Pec Minor Release — Lacrosse Ball","Doorway Pec Stretch"],lats:["Lat Release","Lat Stretch"],upper_trap:["Levator","Levator Scap Stretch"],levator_scap:["Levator","Levator Scap Stretch"],sternocleidomastoid:["Suboccipital Release","Lateral Neck Stretch"]};
  ohsaO.forEach(k=>{if(oMap[k]){releases.add(oMap[k][0]);stretches.add(oMap[k][1]);}});
  const uMap={glute_max:["Glute Bridge","Glute Max","Sit-to-Stand"],glute_med:["Clamshell","Mini Band Lateral Walk (High)"],tva_core:["TVA Draw-In — Supine","Dead Bug","Pallof Press — Band"],lower_trap:["Seated Scapular Retraction — Lower Trap","Prone Y Raise"],serratus_anterior:["Serratus Anterior — Wall Push-Up Plus"],deep_cervical_flexors:["Chin Tucks"],tibialis_anterior:["Tib Anterior Lifts","Arch Lift"],vmq_quads:["Single Leg Balance"],hamstrings:["Hamstring Bridge — Heel Drive","Medial Hamstring"]};
  ohsaU.forEach(k=>{if(uMap[k]) uMap[k].forEach(e=>activations.add(e));});
  const ml=assessment.muscleLength||{};
  const mlMap={pec_minor:["Pec Minor Release — Lacrosse Ball","Doorway Pec Stretch"],lats:["Lat Release","Lat Stretch"],hip_flexors:["Full Quad Release","Kneeling Hip Flexor Stretch"],hamstrings:["Bicep Femoris Release","90/90 Hamstring Stretch"],gastroc_soleus:["Outside Calf Release","Calf Stretch — Bent Knee"],tfl_it_band:["TFL Release","Thomas Stretch"],adductors:["Adductor Release","Adductor Stretch — Side-Lying"],upper_trap:["Levator","Levator Scap Stretch"],levator_scap:["Levator","Levator Scap Stretch"],ql:["QL Release","QL Stretch"]};
  Object.entries(ml).forEach(([k,v])=>{if(v==="tight"&&mlMap[k]){releases.add(mlMap[k][0]);stretches.add(mlMap[k][1]);}});
  const st=assessment.strengthTests||{};
  const stMap={glute_max:["Glute Bridge","Sit-to-Stand"],glute_med:["Clamshell","Side Lying Leg Ext"],lower_trap:["Seated Scapular Retraction — Lower Trap","Lower Trap Lv1"],serratus:["Serratus Anterior — Wall Push-Up Plus"],tva:["TVA Draw-In — Supine","Dead Bug"],deep_cervical:["Chin Tucks"],hip_abductors:["Clamshell","Mini Band Lateral Walk (High)"],hamstrings_strength:["Hamstring Bridge — Heel Drive","Medial Hamstring"],tibialis_anterior:["Tib Anterior Lifts","Arch Lift"]};
  Object.entries(st).forEach(([k,v])=>{if((v==="weak"||v==="inhibited")&&stMap[k]) stMap[k].forEach(e=>activations.add(e));});
  return{findings,release:[...releases],stretch:[...stretches],activate:[...activations],integrate:[...integrations]};
}

function buildProgram(suggestions){
  const toEx=(name,prescription)=>({name,prescription,cue:CUES[name]||"Focus on form and control."});
  const sections=[];
  if(suggestions.release.length>0) sections.push({label:"STEP 1 — RELEASE",color:C.navy,exercises:suggestions.release.slice(0,4).map(n=>toEx(n,"60–90 sec each side"))});
  if(suggestions.stretch.length>0) sections.push({label:"STEP 2 — LENGTHEN",color:C.teal2,exercises:suggestions.stretch.slice(0,5).map(n=>toEx(n,"3 x 45 sec each side"))});
  if(suggestions.activate.length>0) sections.push({label:"STEP 3 — ACTIVATE",color:C.teal,exercises:suggestions.activate.slice(0,5).map(n=>toEx(n,"3 x 12–15"))});
  if(suggestions.integrate.length>0) sections.push({label:"STEP 4 — INTEGRATE",color:C.navy2,exercises:suggestions.integrate.slice(0,3).map(n=>toEx(n,"3 x 10–12"))});
  return{title:"ASSESSMENT-BASED CORRECTIVE PROGRAM — Phase 1",type:"session",sections};
}

        <div style={{marginTop:8,background:C.tealLight,border:`1px solid ${C.teal}33`,borderRadius:8,padding:10}}>

          {progressions.map((p,i)=><div key={i} onClick={()=>doProgress(p)} style={{padding:"7px 10px",borderRadius:5,cursor:"pointer",fontSize:13,color:C.navy,background:i%2===0?C.white:C.tealLight,marginBottom:2}}>{i+1}. {p}</div>)}
        </div>
      )}
      {panel==="swap"&&(
        <div style={{marginTop:8,background:C.grayLight,border:`1px solid ${C.grayBorder}`,borderRadius:8,padding:10}}>
          <div style={{fontSize:10,fontWeight:"bold",color:C.navy,marginBottom:6,letterSpacing:1}}>SWAP — SEARCH 500+ EXERCISES</div>
          <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type to search..." autoFocus/>
          {results.length>0&&<div style={{maxHeight:200,overflowY:"auto",marginTop:6,borderRadius:6,overflow:"hidden"}}>{results.map((e,i)=><div key={i} onClick={()=>doSwap(e.name)} style={{padding:"6px 10px",cursor:"pointer",fontSize:12,color:C.navy,background:i%2===0?C.white:C.grayLight,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{e.name}</span><Tag label={e.category.split("—")[0].trim()} color={C.teal}/></div>)}</div>}
          {search.length<=1&&<div style={{color:C.gray,fontSize:11,padding:"4px 0"}}>Type at least 2 characters</div>}
        </div>
      )}
      {panel==="presc"&&isTrainer&&(
        <div style={{marginTop:8,background:C.amberLight,border:`1px solid ${C.amber}33`,borderRadius:8,padding:10}}>
          <div style={{fontSize:10,fontWeight:"bold",color:C.amber,marginBottom:6,letterSpacing:1}}>EDIT PRESCRIPTION</div>
          <Inp value={prescEdit} onChange={e=>setPrescEdit(e.target.value)} placeholder="Sets x reps..."/>
          <Btn onClick={doSavePresc} color={C.amber} small style={{marginTop:8}}>Save</Btn>
        </div>
      )}
    </div>
  );
}

// ── DAY VIEW ──────────────────────────────────────────────────────────
function DayView({client,di,isTrainer}){
  const day=client.days[di];
  if(!day) return null;
  return(
    <div>
      <div style={{background:C.navy,color:C.white,padding:"12px 16px",borderRadius:"8px 8px 0 0",marginBottom:2}}>
        <div style={{fontSize:12,fontWeight:"bold"}}>{day.title}</div>
      </div>
      {day.sections.map((sec,si)=>(
        <Card key={si}>
          <CardHead title={sec.label} color={sec.color}/>
          {sec.exercises.map((ex,ei)=><ExCard key={ei} ex={ex} cid={client.id} di={di} si={si} ei={ei} isTrainer={isTrainer}/>)}

      ))}
    </div>
  );
}

// ── ASSESSMENT FORM ───────────────────────────────────────────────────
function AssessmentForm({client,isTrainer,existing,onSave}){
  const blank={date:new Date().toISOString().slice(0,10),intake:{dob:"",height:"",weight:"",occupation:"",primaryComplaint:"",painHistory:"",painScale:"",painLocation:"",aggravating:"",relieving:"",surgicalHistory:"",medicalHistory:"",medications:"",activityBackground:""},postural:{head_position:"neutral",shoulder_position:"neutral",left_shoulder:"neutral",right_shoulder:"neutral",thoracic_curve:"normal",lumbar_curve:"normal",pelvic_tilt:"neutral",left_hip:"neutral",right_hip:"neutral",knee_alignment:"neutral",foot_position:"neutral",ankle_dorsiflexion:"normal",notes:""},ohsa:{overactive:[],underactive:[],notes:""},slsq:{leftKnee:"neutral",rightKnee:"neutral",leftHip:"neutral",rightHip:"neutral",trunkLean:"none",armFall:"none",notes:""},muscleLength:{},strengthTests:{},gait:{footTurnout:"neutral",pelvicDrop:"none",trunkLean:"none",armSwing:"normal",notes:""},trainerNotes:""};
  const [form,setForm]=useState(existing||blank);
  const [sec,setSec]=useState("intake");
  const [saved,setSaved]=useState(false);

  const setPath=(path,val)=>{const keys=path.split(".");setForm(prev=>{const next=JSON.parse(JSON.stringify(prev));let obj=next;for(let i=0;i<keys.length-1;i++) obj=obj[keys[i]];obj[keys[keys.length-1]]=val;return next;});};
  const toggleOhsa=(type,key)=>{setForm(prev=>{const next=JSON.parse(JSON.stringify(prev));const arr=next.ohsa[type];const idx=arr.indexOf(key);if(idx>-1) arr.splice(idx,1);else arr.push(key);return next;});};
  const handleSave=()=>{onSave(form);setSaved(true);setTimeout(()=>setSaved(false),2000);};

  // CLIENT VIEW
  if(!isTrainer){
    if(!existing) return(
      <div style={{padding:32,textAlign:"center",color:C.gray}}>
        <div style={{fontSize:40,marginBottom:12}}>📋</div>
        <div style={{fontStyle:"italic"}}>Your assessment hasn't been completed yet. Your trainer will fill this in at your first appointment.</div>
      </div>
    );
    const suggestions=generateSuggestions(existing);
    return(
      <div style={{paddingBottom:24}}>
        <Card>
          <CardHead title="YOUR ASSESSMENT — WHAT WE FOUND"/>
          <CardBody>
            <div style={{fontSize:12,color:C.gray,marginBottom:12,fontStyle:"italic"}}>Assessment date: {existing.date}</div>
            {existing.intake?.primaryComplaint&&<div style={{marginBottom:12}}><div style={{fontWeight:"bold",color:C.navy,fontSize:12,marginBottom:4}}>Your Goal</div><div style={{fontSize:13,color:C.navy}}>{existing.intake.primaryComplaint}</div></div>}
            {suggestions.findings.length>0&&(
              <>
                <div style={{fontWeight:"bold",color:C.navy,fontSize:12,marginBottom:8}}>WHAT WE FOUND IN YOUR BODY</div>
                {suggestions.findings.map((f,i)=>(
                  <div key={i} style={{background:C.grayLight,borderRadius:8,padding:"10px 12px",marginBottom:8,borderLeft:`3px solid ${C.teal}`}}>
                    <div style={{fontWeight:"bold",color:C.navy,fontSize:13,marginBottom:4}}>{f.label}</div>
                    <div style={{fontSize:12,color:C.gray,lineHeight:1.6}}>{f.explain}</div>
                  </div>
                ))}

            )}
          </CardBody>
        </Card>
        <Card>
          <CardHead title="WHY EACH EXERCISE IS IN YOUR PROGRAM" color={C.teal}/>
          <CardBody>
            {[["🔴 RELEASE",suggestions.release,C.red,"These muscles are overworking and need to be calmed down first."],["🟡 LENGTHEN",suggestions.stretch,C.amber,"These muscles are tight. We lengthen them so the correct ones can activate."],["🟢 ACTIVATE",suggestions.activate,C.green,"These muscles are inhibited — not firing when they should be. We wake them up."],["🔵 INTEGRATE",suggestions.integrate,C.teal,"We put it all together in functional movements using the newly activated muscles."]].map(([title,items,color,explain])=>
              items.length>0&&(
                <div key={title} style={{marginBottom:14}}>
                  <div style={{fontWeight:"bold",color,fontSize:12,marginBottom:3}}>{title}</div>
                  <div style={{fontSize:11,color:C.gray,fontStyle:"italic",marginBottom:6}}>{explain}</div>
                  <div style={{display:"flex",flexWrap:"wrap"}}>{items.map((e,i)=><Pill key={i} label={e} color={color}/>)}</div>
                </div>
              )
            )}
          </CardBody>
        </Card>
        {existing.trainerNotes&&<Card><CardHead title="TRAINER NOTES" color={C.purple}/><CardBody><div style={{fontSize:13,color:C.navy,lineHeight:1.7}}>{existing.trainerNotes}</div></CardBody></Card>}
      </div>
    );
  }

  // TRAINER FORM
  const navTabs=[["intake","Intake"],["postural","Postural"],["ohsa","OHSA"],["slsq","SLSQ"],["muscle","Muscle"],["strength","Strength"],["gait","Gait"],["notes","Notes"]];
  const gridStyle={display:"grid",gridTemplateColumns:"1fr 1fr",gap:10};
  const ChkBox=({checked,onClick,label,color=C.teal})=>(
    <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:5,cursor:"pointer",background:checked?color+"18":C.white,marginBottom:4,border:`1px solid ${checked?color+"55":C.grayBorder}`}}>
      <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${checked?color:C.grayBorder}`,background:checked?color:C.white,flexShrink:0}}/>
      <span style={{fontSize:12,color:C.navy}}>{label}</span>
    </div>
  );
  const sugg=generateSuggestions(form);

  return(
    <div style={{paddingBottom:24}}>
      <div style={{display:"flex",background:C.white,borderBottom:`1px solid ${C.grayBorder}`,overflowX:"auto",borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:12}}>
        {navTabs.map(([id,label])=>(
          <button key={id} onClick={()=>setSec(id)} style={{padding:"9px 13px",border:"none",borderBottom:sec===id?`3px solid ${C.teal}`:"3px solid transparent",background:C.white,fontSize:11,fontWeight:sec===id?"bold":"normal",color:sec===id?C.teal:C.gray,cursor:"pointer",flexShrink:0}}>{label}</button>

              <Field label="ASSESSMENT DATE"><Inp value={form.date} onChange={e=>setPath("date",e.target.value)} type="date"/></Field>
              <Field label="HEIGHT"><Inp value={form.intake.height} onChange={e=>setPath("intake.height",e.target.value)} placeholder='5\'8"'/></Field>
              <Field label="WEIGHT"><Inp value={form.intake.weight} onChange={e=>setPath("intake.weight",e.target.value)} placeholder="165 lbs"/></Field>
            </div>
            <Field label="OCCUPATION"><Inp value={form.intake.occupation} onChange={e=>setPath("intake.occupation",e.target.value)} placeholder="e.g. Nurse, Teacher, Construction Worker"/></Field>
            <Field label="PRIMARY COMPLAINT / REASON FOR TRAINING"><TA value={form.intake.primaryComplaint} onChange={e=>setPath("intake.primaryComplaint",e.target.value)} placeholder="What brings them in? What do they want to achieve?" rows={3}/></Field>
            <div style={gridStyle}>
              <Field label="PAIN LOCATION"><Inp value={form.intake.painLocation} onChange={e=>setPath("intake.painLocation",e.target.value)} placeholder="e.g. Left lower back"/></Field>
              <Field label="PAIN SCALE (0–10)"><Inp value={form.intake.painScale} onChange={e=>setPath("intake.painScale",e.target.value)} placeholder="0 = none, 10 = worst"/></Field>
              <Field label="AGGRAVATING FACTORS"><Inp value={form.intake.aggravating} onChange={e=>setPath("intake.aggravating",e.target.value)} placeholder="What makes it worse?"/></Field>
              <Field label="RELIEVING FACTORS"><Inp value={form.intake.relieving} onChange={e=>setPath("intake.relieving",e.target.value)} placeholder="What makes it better?"/></Field>

            <Field label="PAIN HISTORY"><TA value={form.intake.painHistory} onChange={e=>setPath("intake.painHistory",e.target.value)} placeholder="Onset, duration, previous treatment..." rows={2}/></Field>
            <Field label="SURGICAL / INJURY HISTORY"><TA value={form.intake.surgicalHistory} onChange={e=>setPath("intake.surgicalHistory",e.target.value)} placeholder="Surgeries, fractures, significant injuries..." rows={2}/></Field>
            <Field label="MEDICAL HISTORY / CONDITIONS"><TA value={form.intake.medicalHistory} onChange={e=>setPath("intake.medicalHistory",e.target.value)} placeholder="Diagnoses, chronic conditions..." rows={2}/></Field>
            <Field label="CURRENT MEDICATIONS"><Inp value={form.intake.medications} onChange={e=>setPath("intake.medications",e.target.value)} placeholder="List relevant medications"/></Field>
            <Field label="ACTIVITY / FITNESS BACKGROUND" mb={0}><TA value={form.intake.activityBackground} onChange={e=>setPath("intake.activityBackground",e.target.value)} placeholder="Previous training, sports, activity level, deconditioning period..." rows={2}/></Field>
          </CardBody>
        </Card>
      )}

      {sec==="postural"&&(
        <Card>
          <CardHead title="POSTURAL SCREEN"/>
          <CardBody>
            <div style={gridStyle}>
              <Field label="HEAD POSITION"><Sel value={form.postural.head_position} onChange={v=>setPath("postural.head_position",v)} options={[["neutral","Neutral"],["forward","Forward Head"],["retracted","Retracted"]]}/></Field>
              <Field label="SHOULDER POSITION"><Sel value={form.postural.shoulder_position} onChange={v=>setPath("postural.shoulder_position",v)} options={[["neutral","Neutral"],["rounded","Rounded / Protracted"],["retracted","Retracted"]]}/></Field>
              <Field label="LEFT SHOULDER HEIGHT"><Sel value={form.postural.left_shoulder} onChange={v=>setPath("postural.left_shoulder",v)} options={[["neutral","Normal"],["elevated","Elevated"],["depressed","Depressed"]]}/></Field>
              <Field label="RIGHT SHOULDER HEIGHT"><Sel value={form.postural.right_shoulder} onChange={v=>setPath("postural.right_shoulder",v)} options={[["neutral","Normal"],["elevated","Elevated"],["depressed","Depressed"]]}/></Field>
              <Field label="THORACIC CURVE"><Sel value={form.postural.thoracic_curve} onChange={v=>setPath("postural.thoracic_curve",v)} options={[["normal","Normal"],["kyphotic","Kyphotic (hunched)"],["flat","Flat"]]}/></Field>
              <Field label="LUMBAR CURVE"><Sel value={form.postural.lumbar_curve} onChange={v=>setPath("postural.lumbar_curve",v)} options={[["normal","Normal"],["lordotic","Lordotic (arch)"],["flat","Flat / Flexed"]]}/></Field>
              <Field label="PELVIC TILT"><Sel value={form.postural.pelvic_tilt} onChange={v=>setPath("postural.pelvic_tilt",v)} options={[["neutral","Neutral"],["anterior_bilateral","Anterior — Bilateral"],["anterior_left","Anterior — Left Dominant"],["anterior_right","Anterior — Right Dominant"],["posterior","Posterior"]]}/></Field>
              <Field label="LEFT HIP HEIGHT"><Sel value={form.postural.left_hip} onChange={v=>setPath("postural.left_hip",v)} options={[["neutral","Normal"],["elevated","Elevated (hip hike)"],["depressed","Depressed"]]}/></Field>
              <Field label="RIGHT HIP HEIGHT"><Sel value={form.postural.right_hip} onChange={v=>setPath("postural.right_hip",v)} options={[["neutral","Normal"],["elevated","Elevated (hip hike)"],["depressed","Depressed"]]}/></Field>
              <Field label="KNEE ALIGNMENT"><Sel value={form.postural.knee_alignment} onChange={v=>setPath("postural.knee_alignment",v)} options={[["neutral","Neutral"],["valgus_bilateral","Valgus — Bilateral"],["valgus_left","Valgus — Left"],["valgus_right","Valgus — Right"],["varus","Varus"]]}/></Field>
              <Field label="FOOT POSITION"><Sel value={form.postural.foot_position} onChange={v=>setPath("postural.foot_position",v)} options={[["neutral","Neutral"],["pronated_bilateral","Pronated — Bilateral"],["pronated_left","Pronated — Left"],["pronated_right","Pronated — Right"],["supinated","Supinated"]]}/></Field>
              <Field label="ANKLE DORSIFLEXION"><Sel value={form.postural.ankle_dorsiflexion} onChange={v=>setPath("postural.ankle_dorsiflexion",v)} options={[["normal","Normal"],["limited","Limited"],["hypermobile","Hypermobile"]]}/></Field>

// ── CALORIE CALCULATOR ────────────────────────────────────────────────
function CalcView({onApply}){
  const [form,setForm]=useState({weight:"",height:"",age:"",sex:"male",activity:"moderate",goal:"maintenance"});
  const [result,setResult]=useState(null);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const calculate=()=>{
    const w=parseFloat(form.weight),h=parseFloat(form.height),a=parseFloat(form.age);
    if(!w||!h||!a) return;
    const ACTIVITY={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
    const GOAL_ADJ={loss:-500,maintenance:0,gain:350};
    const bmr=form.sex==="male"?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
    const target=Math.round(bmr*ACTIVITY[form.activity])+GOAL_ADJ[form.goal];
    const protein=Math.round((target*0.32)/4),fat=Math.round((target*0.25)/9),carbs=Math.round((target*0.43)/4);
    setResult({calories:target,protein:{pct:32,grams:protein},carbs:{pct:43,grams:carbs},fat:{pct:25,grams:fat}});
  };
  return(
    <Card>
      <CardHead title="CALORIE & MACRO CALCULATOR"/>
      <CardBody>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <Field label="WEIGHT (kg)"><Inp value={form.weight} onChange={e=>f("weight",e.target.value)} placeholder="e.g. 80"/></Field>
          <Field label="HEIGHT (cm)"><Inp value={form.height} onChange={e=>f("height",e.target.value)} placeholder="e.g. 175"/></Field>
          <Field label="AGE"><Inp value={form.age} onChange={e=>f("age",e.target.value)} placeholder="e.g. 32"/></Field>
          <Field label="SEX"><Sel value={form.sex} onChange={v=>f("sex",v)} options={[["male","Male"],["female","Female"]]}/></Field>
        </div>
        <Field label="ACTIVITY LEVEL"><Sel value={form.activity} onChange={v=>f("activity",v)} options={[["sedentary","Sedentary (desk job, no exercise)"],["light","Light (1–2 days/week)"],["moderate","Moderate (3–4 days/week)"],["active","Active (5–6 days/week)"],["very","Very Active (athlete / physical job)"]]}/></Field>
        <Field label="GOAL">
          <div style={{display:"flex",gap:8}}>
            {[["loss","Weight Loss",C.red],["maintenance","Maintenance",C.teal],["gain","Muscle Gain",C.green]].map(([val,label,color])=>(
              <div key={val} onClick={()=>f("goal",val)} style={{flex:1,padding:"8px 4px",borderRadius:7,border:`2px solid ${form.goal===val?color:C.grayBorder}`,background:form.goal===val?color+"15":C.white,textAlign:"center",cursor:"pointer",fontSize:11,fontWeight:"bold",color:form.goal===val?color:C.gray}}>{label}</div>
            ))}
          </div>
        </Field>
        <Btn onClick={calculate} color={C.teal} full>Calculate My Targets</Btn>
        {result&&(
          <div style={{marginTop:14,padding:12,background:C.tealLight,borderRadius:8}}>
            <div style={{fontWeight:"bold",color:C.navy,fontSize:15,marginBottom:8,textAlign:"center"}}>{result.calories.toLocaleString()} calories / day</div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              {[["Protein",result.protein.grams+"g",C.teal],["Carbs",result.carbs.grams+"g",C.amber],["Fat",result.fat.grams+"g",C.red]].map(([l,g,color])=>(
                <div key={l} style={{flex:1,textAlign:"center",padding:8,background:C.white,borderRadius:6,border:`1px solid ${color}33`}}><div style={{fontSize:16,fontWeight:"bold",color}}>{g}</div><div style={{fontSize:10,color:C.gray}}>{l}</div></div>
              ))}
            </div>
            <Btn onClick={()=>onApply(result)} color={C.navy} full>Apply These Targets</Btn>
          </div>
        )}
      </CardBody>
    </Card>
  );
}

// ── NUTRITION VIEW ────────────────────────────────────────────────────
function NutritionView({client}){
  const defMacros=client.nutrition?.macros||{protein:{pct:32,grams:160},carbs:{pct:43,grams:215},fat:{pct:25,grams:56}};
  const defCals=client.nutrition?.calories||2000;
  const [calories,setCalories]=useState(()=>LS.get(`tbf_cals_${client.id}`,defCals));
  const [macros,setMacros]=useState(()=>LS.get(`tbf_macros_${client.id}`,defMacros));
  const [mealSearches,setMealSearches]=useState({});
  const [mealSwaps,setMealSwaps]=useState({});
  const [showCalc,setShowCalc]=useState(false);
  const adjustMacro=(type,newPct)=>{
    const others=["protein","carbs","fat"].filter(t=>t!==type);
    const remaining=100-newPct;
    const tot=macros[others[0]].pct+macros[others[1]].pct;
    const r0=tot>0?macros[others[0]].pct/tot:0.5,r1=tot>0?macros[others[1]].pct/tot:0.5;
    const nm={...macros,[type]:{pct:newPct,grams:Math.round((calories*newPct/100)/(type==="fat"?9:4))},[others[0]]:{pct:Math.round(remaining*r0),grams:Math.round((calories*remaining*r0/100)/(others[0]==="fat"?9:4))},[others[1]]:{pct:Math.round(remaining*r1),grams:Math.round((calories*remaining*r1/100)/(others[1]==="fat"?9:4))}};
    setMacros(nm);LS.set(`tbf_macros_${client.id}`,nm);
  };
  const applyCalc=(result)=>{setCalories(result.calories);setMacros(result);LS.set(`tbf_cals_${client.id}`,result.calories);LS.set(`tbf_macros_${client.id}`,result);setShowCalc(false);};
  const meals=client.nutrition?.meals||[{label:"Breakfast",foods:["Eggs","Spinach","Avocado"],note:"Protein + healthy fats."},{label:"Lunch",foods:["Chicken breast","Brown rice","Broccoli"],note:"Balanced — protein + complex carbs + veggies."},{label:"Dinner",foods:["Salmon","Sweet potato","Asparagus"],note:"Omega-3s + slow carbs + vegetables."},{label:"Snack",foods:["Greek yogurt — whole milk","Blueberries"],note:"Protein + antioxidants."}];
  return(
    <div style={{paddingBottom:24}}>
      <Btn onClick={()=>setShowCalc(!showCalc)} color={showCalc?C.gray:C.teal} full style={{marginBottom:12}}>{showCalc?"Hide Calculator":"📊 Calculate My Calories & Macros"}</Btn>
      {showCalc&&<CalcView onApply={applyCalc}/>}
      <Card>
        <CardHead title={`DAILY TARGET — ${calories.toLocaleString()} CAL`}/>
        <CardBody>
          <MacroSlider label="Protein" pct={macros.protein.pct} grams={macros.protein.grams} color={C.teal} onChange={v=>adjustMacro("protein",v)}/>
          <MacroSlider label="Carbohydrates" pct={macros.carbs.pct} grams={macros.carbs.grams} color={C.amber} onChange={v=>adjustMacro("carbs",v)}/>
          <MacroSlider label="Fat" pct={macros.fat.pct} grams={macros.fat.grams} color={C.red} onChange={v=>adjustMacro("fat",v)}/>
          <div style={{fontSize:10,color:C.gray,textAlign:"center",fontStyle:"italic"}}>Drag sliders to adjust — others auto-balance to 100%</div>
        </CardBody>
      </Card>
      {meals.map((meal,mi)=>{
        const foods=mealSwaps[mi]||meal.foods,search=mealSearches[mi]||"";
        const results=search.length>1?ALL_FOODS.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())).slice(0,8):[];
        return(
          <Card key={mi}>
            <CardHead title={meal.label.toUpperCase()}/>
            <CardBody>
              <div style={{fontSize:11,color:C.gray,fontStyle:"italic",marginBottom:8}}>{meal.note}</div>
              {foods.map((food,fi)=><div key={fi} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:fi<foods.length-1?`1px solid ${C.grayBorder}`:"none"}}><span style={{color:C.teal,fontWeight:"bold"}}>•</span><span style={{fontSize:13,color:C.navy}}>{food}</span></div>)}
              <div style={{marginTop:10}}>
                <Inp value={search} onChange={e=>setMealSearches(p=>({...p,[mi]:e.target.value}))} placeholder="Search whole food library..." style={{fontSize:12}}/>
                {results.length>0&&<div style={{border:`1px solid ${C.grayBorder}`,borderRadius:6,overflow:"hidden",marginTop:4}}>{results.map((f,i)=><div key={i} onClick={()=>{setMealSwaps(p=>({...p,[mi]:[...foods,f.name]}));setMealSearches(p=>({...p,[mi]:""}));}} style={{padding:"6px 10px",cursor:"pointer",fontSize:12,color:C.navy,background:i%2===0?C.white:C.grayLight,display:"flex",justifyContent:"space-between"}}><span>{f.name}</span><Tag label={f.category} color={C.teal}/></div>)}</div>}
              </div>
            </CardBody>
          </Card>
        );
      })}
      {client.nutrition?.supplements&&(
        <Card>
          <CardHead title="SUPPLEMENT TIMING" color={C.teal}/>
          <CardBody>
            {client.nutrition.supplements.map((s,i)=>(
              <div key={i} style={{marginBottom:12}}>
                <div style={{fontWeight:"bold",color:C.navy,fontSize:12,marginBottom:5}}>{s.timing}</div>
                <div style={{display:"flex",flexWrap:"wrap"}}>{s.items.map((item,j)=><Pill key={j} label={item} color={C.teal}/>)}</div>
              </div>
            ))}
          </CardBody>
        </Card>
      )}
    </div>
  );
}

// ── COMPLIANCE ────────────────────────────────────────────────────────
function Compliance({client}){
  const logs=LS.get(`tbf_compliance_${client.id}`,[]);
  const today=new Date();
  const weeks=Array.from({length:6},(_,wi)=>{
    const ws=new Date(today);ws.setDate(today.getDate()-today.getDay()-wi*7);
    const days=Array.from({length:7},(_,di)=>{const d=new Date(ws);d.setDate(ws.getDate()+di);const ds=d.toISOString().slice(0,10);return{date:ds,count:logs.filter(l=>l.date===ds).length,day:["Su","Mo","Tu","We","Th","Fr","Sa"][di]};});
    return{label:wi===0?"This week":`${wi}w ago`,days};
  });
  const thisWeek=weeks[0].days.filter(d=>d.count>0).length;
  return(
    <div style={{paddingBottom:24}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[["This Week",`${thisWeek} ex`,C.teal],["Total Logged",`${logs.length} ex`,C.navy]].map(([label,val,color])=>(
          <div key={label} style={{background:C.white,borderRadius:10,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",padding:14,textAlign:"center"}}><div style={{fontSize:24,fontWeight:"bold",color}}>{val.split(" ")[0]}</div><div style={{fontSize:10,color:C.gray}}>{val.split(" ")[1]}</div><div style={{fontSize:11,color:C.gray,marginTop:2}}>{label}</div></div>
        ))}
      </div>
      {weeks.map((week,wi)=>(
        <Card key={wi}>
          <CardBody p={12}>
            <div style={{fontSize:11,fontWeight:"bold",color:C.gray,marginBottom:8}}>{week.label.toUpperCase()}</div>
            <div style={{display:"flex",gap:5}}>
              {week.days.map((d,di)=>(
                <div key={di} style={{flex:1,textAlign:"center"}}>
                  <div style={{width:"100%",paddingBottom:"100%",borderRadius:5,background:d.count>0?C.teal:C.grayLight,position:"relative"}}>

// ── ADD CLIENT ────────────────────────────────────────────────────────
function AddClientForm({onAdd,onClose}){
  const [form,setForm]=useState({name:"",email:"",password:"",goal:"posture",phase:"1",focus:"",restrictions:""});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleAdd=()=>{
    if(!form.name||!form.email||!form.password) return;
    const template=TEMPLATES[form.goal];
    const client={id:form.email.toLowerCase().replace(/[^a-z0-9]/g,"_"),name:form.name,email:form.email,password:form.password,role:"client",phase:parseInt(form.phase),focus:form.focus||template.focus,goal:template.goal,restrictions:form.restrictions?form.restrictions.split(",").map(r=>r.trim()):[],days:[],schedule:[],nutrition:null};
    onAdd(client);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.white,borderRadius:14,width:"100%",maxWidth:460,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{background:C.navy,color:C.white,padding:"16px 20px",borderRadius:"14px 14px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:"bold",fontSize:15}}>Add New Client</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.white,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:20}}>
          {[["name","FULL NAME","Jane Smith","text"],["email","EMAIL","jane@email.com","email"],["password","INITIAL PASSWORD","Temporary password","password"]].map(([k,label,ph,type])=>(
            <Field key={k} label={label}><Inp value={form[k]} onChange={e=>f(k,e.target.value)} placeholder={ph} type={type}/></Field>
          ))}
          <Field label="PRIMARY GOAL TEMPLATE"><Sel value={form.goal} onChange={v=>f("goal",v)} options={Object.entries(TEMPLATES).map(([k,v])=>[k,v.label])}/></Field>
          <Field label="STARTING PHASE"><Sel value={form.phase} onChange={v=>f("phase",v)} options={[["1","Phase 1"],["2","Phase 2"],["3","Phase 3"]]}/></Field>
          <Field label="FOCUS (optional)"><Inp value={form.focus} onChange={e=>f("focus",e.target.value)} placeholder="e.g. UCS | Lower Back | Post-Op"/></Field>
          <Field label="RESTRICTIONS (comma separated)"><Inp value={form.restrictions} onChange={e=>f("restrictions",e.target.value)} placeholder="e.g. No overhead pressing, No lumbar flexion"/></Field>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <Btn onClick={onClose} color={C.grayLight} textColor={C.navy} full>Cancel</Btn>
            <Btn onClick={handleAdd} color={C.teal} full>Add Client</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── TRAINER ROSTER ────────────────────────────────────────────────────
function TrainerRoster({clients,onSelect,onAddClient}){
  return(
    <div style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:"bold",color:C.navy,fontSize:16}}>Client Roster</div>
        <Btn onClick={onAddClient} color={C.teal} small>+ Add Client</Btn>
      </div>
      {clients.length===0&&<div style={{textAlign:"center",color:C.gray,padding:40,fontStyle:"italic"}}>No clients yet. Add your first client above.</div>}
      {clients.map(c=>{
        const hasAssessment=LS.get(`tbf_assessment_${c.id}`,null)!==null;
        return(
          <div key={c.id} onClick={()=>onSelect(c)} style={{background:C.white,borderRadius:10,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",padding:"14px 16px",marginBottom:10,cursor:"pointer",borderLeft:`4px solid ${C.teal}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:"bold",color:C.navy,fontSize:15}}>{c.name}</div>
              <div style={{fontSize:11,color:C.gray,marginTop:2}}>{c.focus}</div>
              <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>
                <Pill label={`Phase ${c.phase}`} color={C.teal}/>
                {hasAssessment?<Pill label="✓ Assessment" color={C.green}/>:<Pill label="No Assessment" color={C.amber}/>}
                {c.restrictions?.slice(0,1).map((r,i)=><Pill key={i} label={r} color={C.red}/>)}
              </div>
            </div>
            <span style={{color:C.teal,fontSize:24}}>›</span>
          </div>
        );
      })}
    </div>
  );
}

// ── REGISTER ──────────────────────────────────────────────────────────
function Register({onRegister,onBack}){
  const [form,setForm]=useState({name:"",email:"",password:"",confirm:"",goal:"posture"});
  const [err,setErr]=useState("");
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleRegister=()=>{
    if(!form.name||!form.email||!form.password){setErr("Please fill in all fields.");return;}
    if(form.password!==form.confirm){setErr("Passwords do not match.");return;}
    if(form.password.length<6){setErr("Password must be at least 6 characters.");return;}
    const template=TEMPLATES[form.goal];
    const newClient={id:form.email.toLowerCase().replace(/[^a-z0-9]/g,"_"),name:form.name,email:form.email,password:form.password,role:"client",phase:1,focus:template.focus,goal:template.goal,restrictions:[],days:[],schedule:[],nutrition:null};
    const existing=LS.get("tbf_clients",[]);
    LS.set("tbf_clients",[...existing,newClient]);
    onRegister(newClient);
  };
  return(
    <div style={{minHeight:"100vh",background:C.navy,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{color:C.white,fontWeight:"bold",fontSize:26,letterSpacing:1}}>True Balance</div>
      <div style={{color:C.tealLight,fontSize:12,letterSpacing:3,marginBottom:32}}>FITNESS</div>
      <div style={{background:C.white,borderRadius:14,padding:28,width:"100%",maxWidth:380,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{fontWeight:"bold",color:C.navy,fontSize:16,marginBottom:20,textAlign:"center"}}>Create Your Account</div>
        {[["name","FULL NAME","Jane Smith","text"],["email","EMAIL","jane@email.com","email"],["password","PASSWORD","Min. 6 characters","password"],["confirm","CONFIRM PASSWORD","Re-enter password","password"]].map(([k,label,ph,type])=>(
          <Field key={k} label={label}><Inp value={form[k]} onChange={e=>f(k,e.target.value)} placeholder={ph} type={type}/></Field>
        ))}
        <Field label="MY PRIMARY GOAL">
          <Sel value={form.goal} onChange={v=>f("goal",v)} options={Object.entries(TEMPLATES).map(([k,v])=>[k,v.label])}/>
        </Field>
        {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,textAlign:"center"}}>{err}</div>}
        <Btn onClick={handleRegister} color={C.teal} full style={{marginBottom:10}}>Create Account</Btn>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.gray,fontSize:12,cursor:"pointer",width:"100%"}}>← Back to Sign In</button>
      </div>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────
function Login({onLogin,onRegister}){
  const [name,setName]=useState("");const [pass,setPass]=useState("");const [err,setErr]=useState("");
  const handleLogin=()=>{
    if(name.toLowerCase().replace(/\s/g,"")==="anthonyanderson"&&pass==="TBF228!"){LS.set("tbf_session",{id:"trainer",role:"trainer"});onLogin(TRAINER_USER);return;}
    const clients=LS.get("tbf_clients",INITIAL_CLIENTS);
    const found=clients.find(c=>(c.name.toLowerCase().replace(/\s/g,"")=== name.toLowerCase().replace(/\s/g,"")||c.email?.toLowerCase()===name.toLowerCase())&&c.password===pass);
    if(found){LS.set("tbf_session",{id:found.id,role:"client"});onLogin(found);}
    else setErr("Name/email or password incorrect.");
  };
  return(
    <div style={{minHeight:"100vh",background:C.navy,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{color:C.white,fontWeight:"bold",fontSize:28,letterSpacing:1}}>True Balance</div>
      <div style={{color:C.tealLight,fontSize:12,letterSpacing:3,marginBottom:36}}>FITNESS</div>
      <div style={{background:C.white,borderRadius:14,padding:28,width:"100%",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{fontWeight:"bold",color:C.navy,fontSize:16,marginBottom:22,textAlign:"center"}}>Sign In to Your Plan</div>
        <Field label="NAME OR EMAIL"><Inp value={name} onChange={e=>setName(e.target.value)} placeholder="Full name or email address"/></Field>
        <Field label="PASSWORD"><Inp value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="Your password"/></Field>
        {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,textAlign:"center"}}>{err}</div>}
        <Btn onClick={handleLogin} color={C.teal} full style={{marginBottom:12}}>Sign In</Btn>
        <button onClick={onRegister} style={{background:"none",border:`1.5px solid ${C.grayBorder}`,borderRadius:7,color:C.navy,fontSize:13,cursor:"pointer",width:"100%",padding:"10px 0",fontWeight:"bold"}}>Create Account</button>
        <div style={{marginTop:16,fontSize:11,color:C.gray,textAlign:"center"}}>True Balance Fitness · 228-229-6865</div>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{
    const session=LS.get("tbf_session");
    if(!session) return null;
    if(session.role==="trainer") return TRAINER_USER;
    const clients=LS.get("tbf_clients",INITIAL_CLIENTS);
    return clients.find(c=>c.id===session.id)||null;
  });
  const [screen,setScreen]=useState(()=>LS.get("tbf_session")?"app":"login");
  const [viewing,setViewing]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [clients,setClients]=useState(()=>LS.get("tbf_clients",INITIAL_CLIENTS));

  const handleLogin=(u)=>{setUser(u);setScreen("app");};
  const handleLogout=()=>{setUser(null);setViewing(null);LS.del("tbf_session");setScreen("login");};
  const handleAddClient=(c)=>{const updated=[...clients,c];setClients(updated);LS.set("tbf_clients",updated);setShowAdd(false);};
  const handleClientUpdate=(updatedClient)=>{const updated=clients.map(c=>c.id===updatedClient.id?updatedClient:c);setClients(updated);LS.set("tbf_clients",updated);if(viewing?.id===updatedClient.id) setViewing(updatedClient);};

  const isTrainer=user?.role==="trainer";

  if(screen==="register") return <Register onRegister={handleLogin} onBack={()=>setScreen("login")}/>;
  if(screen==="login"||!user) return <Login onLogin={handleLogin} onRegister={()=>setScreen("register")}/>;

  const activeClient=isTrainer?viewing:clients.find(c=>c.id===user.id)||user;

  return(
    <div style={{minHeight:"100vh",background:C.cream}}>
      <div style={{background:C.navy,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}}>
        <div>
          <div style={{color:C.white,fontWeight:"bold",fontSize:17}}>{isTrainer&&viewing?viewing.name:"True Balance Fitness"}</div>
          <div style={{color:C.tealLight,fontSize:11,marginTop:1}}>{isTrainer&&!viewing?"Trainer Dashboard":isTrainer?"Client View":user.focus?.split("|")[0]?.trim()}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {isTrainer&&viewing&&<Btn onClick={()=>setViewing(null)} color={C.navy2} small>← Roster</Btn>}
          <Btn onClick={handleLogout} color={C.red} small>Sign Out</Btn>
        </div>
      </div>
      {showAdd&&<AddClientForm onAdd={handleAddClient} onClose={()=>setShowAdd(false)}/>}
      {isTrainer&&!viewing&&<TrainerRoster clients={clients.filter(c=>c.role==="client")} onSelect={c=>setViewing(c)} onAddClient={()=>setShowAdd(true)}/>}
      {isTrainer&&viewing&&<ClientView client={viewing} isTrainer={true} onClientUpdate={handleClientUpdate}/>}
      {!isTrainer&&activeClient&&<ClientView client={activeClient} isTrainer={false} onClientUpdate={handleClientUpdate}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
