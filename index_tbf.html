<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tbf-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="theme-color" content="#1C2B39"/>
    <title>True Balance Fitness</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{font-family:Georgia,serif;background:#F7F6F1;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
      input,select,textarea,button{font-family:Georgia,serif;}
      input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:4px;outline:none;cursor:pointer;background:#E5E7EB;}
      input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:none;}
      .sc{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
